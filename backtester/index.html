<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypher | Ghost Protocol Backtester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --card-bg: #121214;
            --cypher-neon: #00ff9d;
            --ghost-white: #e1e1e6;
            --danger-red: #ff4d4d;
            --border-color: #2a2a2e;
        }
        body { 
            background-color: var(--bg-dark); 
            color: var(--ghost-white);
            font-family: 'JetBrains+Mono', monospace;
        }
        .card { 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color);
            margin-bottom: 20px; 
        }
        .card-header {
            background-color: rgba(0, 255, 157, 0.05) !important;
            border-bottom: 1px solid var(--border-color);
            color: var(--cypher-neon);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .form-control, .form-select {
            background-color: #1a1a1d;
            border: 1px solid var(--border-color);
            color: var(--ghost-white);
            font-size: 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            background-color: #1a1a1d;
            border-color: var(--cypher-neon);
            color: var(--ghost-white);
            box-shadow: 0 0 5px rgba(0, 255, 157, 0.2);
        }
        .btn-cypher {
            background-color: transparent;
            border: 1px solid var(--cypher-neon);
            color: var(--cypher-neon);
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .btn-cypher:hover {
            background-color: var(--cypher-neon);
            color: var(--bg-dark);
        }
        .table-container { max-height: 500px; overflow-y: auto; }
        .table { color: var(--ghost-white); border-color: var(--border-color); }
        .table-dark { --bs-table-bg: #1a1a1d; }
        .text-success { color: var(--cypher-neon) !important; }
        .text-danger { color: var(--danger-red) !important; }
        .stats-box {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
        }
        .stats-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stats-value { font-size: 1.2rem; font-weight: bold; color: var(--cypher-neon); }
        .text-highlight { color: #ffffff !important; font-weight: bold; background: #000000; border: 1px solid var(--cypher-neon); padding: 5px 10px; border-radius: 3px; display: inline-block; margin-top: 5px; }
        .loading { display: none; }
        hr { border-color: var(--border-color); opacity: 0.1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="h3 mb-0" style="color: var(--cypher-neon)">CYPHER // SNIPER'S NEST</h1>
                <p class="small text-muted mb-0">Operator: GHOST | System: Active</p>
            </div>
            <div class="text-end">
                <span class="badge rounded-pill" style="border: 1px solid var(--cypher-neon); color: var(--cypher-neon)">v3.0.1_OPTIMIZER</span>
            </div>
        </div>
        
        <div class="row">
            <!-- Sidebar: Parameters -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Target Parameters</div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label class="stats-label mb-2">Target Asset</label>
                            <select id="coinSelect" class="form-select">
                                <option value="BTCUSDT">BTCUSDT [SCANNING...]</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="stats-label mb-2">Take Profit (% Range)</label>
                            <div class="input-group input-group-sm mb-2">
                                <span class="input-group-text bg-transparent border-end-0 text-muted small">MIN %</span>
                                <input type="number" id="tp_min" class="form-control border-start-0 text-center" value="0.5" step="0.1">
                                <span class="input-group-text bg-transparent border-end-0 text-muted small">MAX %</span>
                                <input type="number" id="tp_max" class="form-control border-start-0 text-center" value="1.5" step="0.1">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="stats-label mb-2">Stop Loss (% Range)</label>
                            <div class="input-group input-group-sm mb-2">
                                <span class="input-group-text bg-transparent border-end-0 text-muted small">MIN %</span>
                                <input type="number" id="sl_min" class="form-control border-start-0 text-center" value="0.3" step="0.1">
                                <span class="input-group-text bg-transparent border-end-0 text-muted small">MAX %</span>
                                <input type="number" id="sl_max" class="form-control border-start-0 text-center" value="1.0" step="0.1">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="stats-label mb-2">Granularity (Step Size %)</label>
                            <input type="number" id="step" class="form-control form-control-sm text-center" value="0.1" step="0.05">
                        </div>

                        <button id="optimizeBtn" class="btn btn-cypher w-100 py-2">EXECUTE OPTIMIZATION</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Single Instance Test</div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col">
                                <label class="stats-label mb-1">TP %</label>
                                <input type="number" id="single_tp" class="form-control form-control-sm text-center" value="0.8" step="0.1">
                            </div>
                            <div class="col">
                                <label class="stats-label mb-1">SL %</label>
                                <input type="number" id="single_sl" class="form-control form-control-sm text-center" value="0.5" step="0.1">
                            </div>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="trail_check">
                            <label class="stats-label" for="trail_check">Trailing Activation</label>
                        </div>
                        <div id="trail_options" style="display:none;">
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="stats-label mb-1">Trigger %</label>
                                    <input type="number" id="trail_act" class="form-control form-control-sm text-center" value="1.0" step="0.1">
                                </div>
                                <div class="col">
                                    <label class="stats-label mb-1">Gap %</label>
                                    <input type="number" id="trail_dist" class="form-control form-control-sm text-center" value="0.5" step="0.1">
                                </div>
                            </div>
                        </div>
                        <button id="backtestBtn" class="btn btn-cypher w-100 py-2" style="border-color: #0088ff; color: #0088ff;">RUN ISOLATED BACKTEST</button>
                    </div>
                </div>
            </div>

            <!-- Main Results -->
            <div class="col-md-8">
                <div id="loading" class="text-center py-5 loading">
                    <div class="spinner-border" style="color: var(--cypher-neon)" role="status"></div>
                    <p class="mt-3 small" id="loadingText">OPTIMIZING NEURAL PATHS...</p>
                </div>

                <div id="resultsArea">
                    <div class="card mb-4">
                        <div class="card-header">Intelligence Summary</div>
                        <div class="card-body" id="summaryStats">
                            <p class="text-muted small">Awaiting execution data, Ghost.</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span id="tableTitle">DATA GRID</span>
                        </div>
                        <div class="card-body p-0 table-container">
                            <table class="table table-dark table-hover mb-0" id="resultsTable" style="font-size: 0.75rem;">
                                <thead>
                                    <tr id="tableHeader" class="stats-label" style="background: rgba(0,0,0,0.2)">
                                        <!-- Dynamic Header -->
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <!-- Dynamic Body -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('trail_check').addEventListener('change', function() {
            document.getElementById('trail_options').style.display = this.checked ? 'block' : 'none';
        });

        async function loadCoins() {
            try {
                const res = await fetch('/api/top_coins');
                const coins = await res.json();
                const select = document.getElementById('coinSelect');
                select.innerHTML = '';
                coins.forEach(coin => {
                    const opt = document.createElement('option');
                    opt.value = coin;
                    opt.textContent = `[+] ${coin}`;
                    select.appendChild(opt);
                });
            } catch (err) {
                const select = document.getElementById('coinSelect');
                select.innerHTML = '<option value="BTCUSDT">BTCUSDT [OFFLINE]</option>';
            }
        }
        loadCoins();

        function showLoading(show, text = "PROCESSING...") {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('resultsArea').style.display = show ? 'none' : 'block';
        }

        document.getElementById('backtestBtn').addEventListener('click', async () => {
            showLoading(true, "FETCHING HISTORICAL CANDLES...");
            try {
                const data = {
                    symbol: document.getElementById('coinSelect').value,
                    tp: document.getElementById('single_tp').value / 100,
                    sl: document.getElementById('single_sl').value / 100,
                    trail: document.getElementById('trail_check').checked,
                    trail_act: document.getElementById('trail_act').value / 100,
                    trail_dist: document.getElementById('trail_dist').value / 100,
                    kill_time: null
                };

                const res = await fetch('/api/backtest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const trades = await res.json();
                showLoading(false);
                displayTrades(trades);
            } catch (err) {
                showLoading(false);
                alert("Critical System Error: " + err.message);
            }
        });

        document.getElementById('optimizeBtn').addEventListener('click', async () => {
            showLoading(true, "BRUTE-FORCING OPTIMAL RANGES...");
            try {
                const data = {
                    symbol: document.getElementById('coinSelect').value,
                    tp_min: document.getElementById('tp_min').value / 100,
                    tp_max: document.getElementById('tp_max').value / 100,
                    sl_min: document.getElementById('sl_min').value / 100,
                    sl_max: document.getElementById('sl_max').value / 100,
                    step: document.getElementById('step').value / 100
                };

                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const results = await res.json();
                showLoading(false);
                displayOptimization(results);
            } catch (err) {
                showLoading(false);
                alert("Critical System Error: " + err.message);
            }
        });

        function displayTrades(trades) {
            document.getElementById('tableTitle').textContent = "ISOLATED TRADE LOG";
            const header = document.getElementById('tableHeader');
            header.innerHTML = '<th>ENTRY</th><th>EXIT</th><th>PRICE IN</th><th>PRICE OUT</th><th>PNL %</th><th>REASON</th>';
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            if (!trades || trades.length === 0) {
                body.innerHTML = '<tr><td colspan="6" class="text-center py-4 opacity-50">NO SIGNALS DETECTED IN THIS CYCLE.</td></tr>';
                return;
            }

            let totalPnl = 0;
            let wins = 0;
            trades.forEach(t => {
                totalPnl += t.pnl_pct;
                if(t.pnl_pct > 0) wins++;
                body.innerHTML += `<tr>
                    <td>${t.entry_time.split(' ')[1]}</td>
                    <td>${t.exit_time.split(' ')[1]}</td>
                    <td>${t.entry.toFixed(2)}</td>
                    <td>${t.exit.toFixed(2)}</td>
                    <td class="${t.pnl_pct >= 0 ? 'text-success' : 'text-danger'}">${t.pnl_pct.toFixed(2)}%</td>
                    <td>${t.reason}</td>
                </tr>`;
            });

            const winRate = (wins/trades.length*100).toFixed(1);
            document.getElementById('summaryStats').innerHTML = `
                <div class="row text-center">
                    <div class="col"><div class="stats-label">Cumulative PnL</div><div class="stats-value ${totalPnl >= 0 ? 'text-success' : 'text-danger'}">${totalPnl.toFixed(2)}%</div></div>
                    <div class="col"><div class="stats-label">Win Rate</div><div class="stats-value">${winRate}%</div></div>
                    <div class="col"><div class="stats-label">Executions</div><div class="stats-value">${trades.length}</div></div>
                </div>`;
        }

        function displayOptimization(results) {
            document.getElementById('tableTitle').textContent = "OPTIMIZATION HEATMAP (TOP PNL)";
            const header = document.getElementById('tableHeader');
            header.innerHTML = '<th>TP %</th><th>SL %</th><th>TOTAL PNL</th><th>WIN RATE</th><th>TRADES</th>';
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            results.slice(0, 50).forEach(r => {
                body.innerHTML += `<tr>
                    <td>${(r.tp*100).toFixed(2)}%</td>
                    <td>${(r.sl*100).toFixed(2)}%</td>
                    <td class="${r.total_pnl >= 0 ? 'text-success' : 'text-danger'} font-weight-bold">${r.total_pnl.toFixed(2)}%</td>
                    <td>${r.win_rate}%</td>
                    <td>${r.trade_count}</td>
                </tr>`;
            });

            document.getElementById('summaryStats').innerHTML = `
                <p class="mb-0">OPTIMAL CONFIGURATION FOUND: <span class="text-highlight">TP ${(results[0].tp*100).toFixed(2)}% / SL ${(results[0].sl*100).toFixed(2)}%</span> yields <span class="text-highlight">${results[0].total_pnl.toFixed(2)}%</span> total profit.</p>
            `;
        }
    </script>
</body>
</html>
