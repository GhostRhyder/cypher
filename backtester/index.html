<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Backtest Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { max-height: 400px; overflow-y: auto; }
        .loading { display: none; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4 text-center">Crypto Backtest Optimizer</h1>
        
        <div class="row">
            <!-- Configuration Column -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">Settings</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Select Coin</label>
                            <select id="coinSelect" class="form-select">
                                <option value="BTCUSDT">BTCUSDT (Loading...)</option>
                            </select>
                        </div>
                        <hr>
                        <h6>Optimization Ranges</h6>
                        <div class="row mb-2">
                            <div class="col">
                                <label class="form-label small">TP Min</label>
                                <input type="number" id="tp_min" class="form-control" value="0.005" step="0.001">
                            </div>
                            <div class="col">
                                <label class="form-label small">TP Max</label>
                                <input type="number" id="tp_max" class="form-control" value="0.015" step="0.001">
                            </div>
                        </div>
                        <div class="row mb-2">
                            <div class="col">
                                <label class="form-label small">SL Min</label>
                                <input type="number" id="sl_min" class="form-control" value="0.003" step="0.001">
                            </div>
                            <div class="col">
                                <label class="form-label small">SL Max</label>
                                <input type="number" id="sl_max" class="form-control" value="0.010" step="0.001">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Step Size</label>
                            <input type="number" id="step" class="form-control" value="0.001" step="0.0001">
                        </div>
                        <button id="optimizeBtn" class="btn btn-success w-100">Run Optimization</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-info text-white">Backtest Single Settings</div>
                    <div class="card-body">
                        <div class="row mb-2">
                            <div class="col">
                                <label class="form-label small">TP %</label>
                                <input type="number" id="single_tp" class="form-control" value="0.008" step="0.001">
                            </div>
                            <div class="col">
                                <label class="form-label small">SL %</label>
                                <input type="number" id="single_sl" class="form-control" value="0.005" step="0.001">
                            </div>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="trail_check">
                            <label class="form-check-label small" for="trail_check">Enable Trailing Stop</label>
                        </div>
                        <div id="trail_options" style="display:none;">
                            <div class="row mb-2">
                                <div class="col">
                                    <label class="form-label small">Activation %</label>
                                    <input type="number" id="trail_act" class="form-control" value="0.01" step="0.001">
                                </div>
                                <div class="col">
                                    <label class="form-label small">Distance %</label>
                                    <input type="number" id="trail_dist" class="form-control" value="0.005" step="0.001">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Kill Time (candles)</label>
                            <input type="number" id="kill_time" class="form-control" placeholder="Optional">
                        </div>
                        <button id="backtestBtn" class="btn btn-primary w-100">Run Single Backtest</button>
                    </div>
                </div>
            </div>

            <!-- Results Column -->
            <div class="col-md-8">
                <div id="loading" class="text-center py-5 loading">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2" id="loadingText">Processing backtest data...</p>
                </div>

                <div id="resultsArea">
                    <div class="card">
                        <div class="card-header">Summary</div>
                        <div class="card-body" id="summaryStats">
                            <p class="text-muted">Run a backtest or optimization to see results.</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header d-flex justify-content-between">
                            <span id="tableTitle">Results Table</span>
                        </div>
                        <div class="card-body table-container">
                            <table class="table table-striped table-hover small" id="resultsTable">
                                <thead class="table-dark">
                                    <tr id="tableHeader">
                                        <!-- Dynamic Header -->
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <!-- Dynamic Body -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('trail_check').addEventListener('change', function() {
            document.getElementById('trail_options').style.display = this.checked ? 'block' : 'none';
        });

        // Load top coins on start
        async function loadCoins() {
            try {
                const res = await fetch('/api/top_coins');
                const coins = await res.json();
                const select = document.getElementById('coinSelect');
                select.innerHTML = '';
                coins.forEach(coin => {
                    const opt = document.createElement('option');
                    opt.value = coin;
                    opt.textContent = coin;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load coins:", err);
                const select = document.getElementById('coinSelect');
                select.innerHTML = '<option value="BTCUSDT">BTCUSDT (Error loading others)</option>';
            }
        }
        loadCoins();

        function showLoading(show, text = "Processing backtest data...") {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('resultsArea').style.display = show ? 'none' : 'block';
        }

        document.getElementById('backtestBtn').addEventListener('click', async () => {
            showLoading(true, "Fetching data and running backtest...");
            try {
                const data = {
                    symbol: document.getElementById('coinSelect').value,
                    tp: document.getElementById('single_tp').value,
                    sl: document.getElementById('single_sl').value,
                    trail: document.getElementById('trail_check').checked,
                    trail_act: document.getElementById('trail_act').value,
                    trail_dist: document.getElementById('trail_dist').value,
                    kill_time: document.getElementById('kill_time').value || null
                };

                const res = await fetch('/api/backtest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) throw new Error("Server error during backtest");
                const trades = await res.json();
                showLoading(false);
                displayTrades(trades);
            } catch (err) {
                showLoading(false);
                alert("Error: " + err.message);
            }
        });

        document.getElementById('optimizeBtn').addEventListener('click', async () => {
            showLoading(true, "Running multi-parameter optimization (this may take 10-20 seconds)...");
            try {
                const data = {
                    symbol: document.getElementById('coinSelect').value,
                    tp_min: document.getElementById('tp_min').value,
                    tp_max: document.getElementById('tp_max').value,
                    sl_min: document.getElementById('sl_min').value,
                    sl_max: document.getElementById('sl_max').value,
                    step: document.getElementById('step').value
                };

                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) throw new Error("Server error during optimization");
                const results = await res.json();
                showLoading(false);
                displayOptimization(results);
            } catch (err) {
                showLoading(false);
                alert("Error: " + err.message);
            }
        });

        function displayTrades(trades) {
            document.getElementById('tableTitle').textContent = "Trade History";
            const header = document.getElementById('tableHeader');
            header.innerHTML = '<th>Entry Time</th><th>Exit Time</th><th>Entry</th><th>Exit</th><th>PnL %</th><th>Reason</th>';
            
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            if (!trades || trades.length === 0) {
                body.innerHTML = '<tr><td colspan="6" class="text-center">No trades found for these settings.</td></tr>';
                document.getElementById('summaryStats').innerHTML = '<p class="text-muted">No trades to summarize.</p>';
                return;
            }

            let totalPnl = 0;
            let wins = 0;
            
            trades.forEach(t => {
                totalPnl += t.pnl_pct;
                if(t.pnl_pct > 0) wins++;
                const row = `<tr>
                    <td>${t.entry_time}</td>
                    <td>${t.exit_time}</td>
                    <td>${t.entry.toFixed(6)}</td>
                    <td>${t.exit.toFixed(6)}</td>
                    <td class="${t.pnl_pct >= 0 ? 'text-success' : 'text-danger'}">${t.pnl_pct.toFixed(2)}%</td>
                    <td>${t.reason}</td>
                </tr>`;
                body.innerHTML += row;
            });

            const winRate = (wins/trades.length*100).toFixed(2);
            document.getElementById('summaryStats').innerHTML = `
                <div class="row text-center">
                    <div class="col"><h5>Total PnL</h5><p class="${totalPnl >= 0 ? 'text-success' : 'text-danger'}">${totalPnl.toFixed(2)}%</p></div>
                    <div class="col"><h5>Win Rate</h5><p>${winRate}%</p></div>
                    <div class="col"><h5>Trades</h5><p>${trades.length}</p></div>
                </div>
            `;
        }

        function displayOptimization(results) {
            document.getElementById('tableTitle').textContent = "Optimization Results (Sorted by PnL)";
            const header = document.getElementById('tableHeader');
            header.innerHTML = '<th>TP %</th><th>SL %</th><th>Total PnL</th><th>Win Rate</th><th>Trade Count</th>';
            
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            if (!results || results.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="text-center">No optimization results.</td></tr>';
                return;
            }

            results.forEach(r => {
                const row = `<tr>
                    <td>${(r.tp*100).toFixed(2)}%</td>
                    <td>${(r.sl*100).toFixed(2)}%</td>
                    <td class="${r.total_pnl >= 0 ? 'text-success' : 'text-danger'} font-weight-bold">${r.total_pnl.toFixed(2)}%</td>
                    <td>${r.win_rate}%</td>
                    <td>${r.trade_count}</td>
                </tr>`;
                body.innerHTML += row;
            });

            document.getElementById('summaryStats').innerHTML = `
                <p>Top Performing TP: <strong>${(results[0].tp*100).toFixed(2)}%</strong>, SL: <strong>${(results[0].sl*100).toFixed(2)}%</strong> with <strong>${results[0].total_pnl.toFixed(2)}%</strong> PnL.</p>
            `;
        }
    </script>
</body>
</html>
